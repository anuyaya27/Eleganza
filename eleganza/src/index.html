<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eleganza</title>
  <style>
    /* General Styles */
    body {
      font-family: 'Arial', sans-serif;
      background-color: #f3f4f6;
      margin: 0;
      padding: 0;
    }

    /* Container for centered content */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    /* Heading Styles */
    h1 {
      color: #4b5563;
      font-size: 36px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    /* Button Styles */
    .button {
      padding: 10px 20px;
      background-color: #10b981;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    /* Button hover effect */
    .button:hover {
      background-color: #059669;
    }

    /* Image Styles */
    .Eleganza {
      width: 100%; /* Make the image responsive */
      max-width: 600px; /* Max width of the image */
      margin-bottom: 20px;
      display: block;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Welcome to Eleganza!</h1>
    <!-- Add Canva image here -->
    <img src="Eleganza.png" alt="Canva Design" class="canva-image">
    <button class="button">Start Styling</button>
  </div>
</body>
</html>
